name: Update Lake James Legislation Tracker

on:
  schedule:
    # Runs every Sunday at 13:00 UTC (8:00 AM EST)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to manually trigger the script anytime via the GitHub UI
permissions:
  contents: write
  
jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run tracking script
      env:
        LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
      run: python Code

    - name: Commit and push updated CSV
      run: |
        git config --global user.name "kathrynkilgallen"
        git config --global user.email "kathryn.kilgallen@gmail.com"
        git add lake_james_legislation.csv
        git commit -m "Automated Daily Update: Lake James Legislation" || echo "No changes to commit"
        git push
        git add .github/workflows/tracker.yml
        git commit -m "Add automation workflow"
        git push origin main

